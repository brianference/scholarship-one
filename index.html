<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholarship One — find scholarships that fit</title>
    <meta
      name="description"
      content="Search real scholarships by major, background, and need. Save programs, track applications, and open official sites. No invented awards."
    />
    <meta name="author" content="Brian Ference" />
    <meta property="og:title" content="Scholarship One — find scholarships that fit" />
    <meta
      property="og:description"
      content="Search real scholarships by major, background, and need. Save programs, track applications, and open official sites."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="keywords" content="scholarships, financial aid, college, STEM, nursing, TypeScript, React" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var t = localStorage.getItem('scholarship-theme') || localStorage.getItem('portfolio-theme')
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light')
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light')
      }
      document.documentElement.setAttribute('data-design', 'peach')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main style="font-family:system-ui;max-width:40rem;margin:2rem auto;padding:1rem">
        <h1>Scholarship One</h1>
        <p>Find scholarships that fit. Enable JavaScript for the full app.</p>
        <p><a href="https://github.com/brianference/scholarship-one">GitHub</a></p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
