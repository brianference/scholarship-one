name: Deadline reminders

on:
  schedule:
    - cron: '0 13 * * *' # daily 13:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log only, do not send'
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Reminder selection unit test
        run: npx tsx scripts/qa-reminders.ts
      - name: Send due reminders
        run: npx tsx scripts/send-reminders.ts ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
