name: QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  qa-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Match scenarios
        run: npm run qa:match
      - name: Full QA suite
        run: npm run qa
      - name: Production build
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
